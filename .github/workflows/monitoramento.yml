name: Alerta de Monitoramento Discord
on:
  push:
    branches: [ "main" ]

jobs:
  alert-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar Alerta
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          content: " Commit realizado com sucesso no repositório projeto-devops da Léa!"
          title: "Status do Monitoramento"
