name: Continuous Integrations

on:
  push:
    branches: [ "main", "desenvolvimento", "criaçâo-cd" ]
  pull_request:
    branches: [ "main" ]

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Rodar código
        run: python main.py

  # ESTE BLOCO DEVE FICAR ALINHADO COM O 'deliver' ACIMA
  docker:
    runs-on: ubuntu-latest
    needs: deliver
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t meu-projeto-python .






