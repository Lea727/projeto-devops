name: CI/CD

on:
  push:
    branches: [ "main", "desenvolvimento", "criaçâo-cd" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Rodar código
        run: python main.py

  deploy:
    runs-on: ubuntu-latest
    needs: build   # 👈 ISSO FAZ O FLUXO IGUAL AO EXEMPLO

    steps:
      - name: Simulando deploy
        run: echo "Deploy realizado com sucesso!"